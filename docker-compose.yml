services:
  mysql:
    image: mysql:8.4
    container_name: army_vehicle_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: army_vehicle_system
      MYSQL_USER: army_user
      MYSQL_PASSWORD: army_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    container_name: army_vehicle_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      STORAGE_DIR: /storage
    volumes:
      - ./storage:/storage
    ports:
      - "8000:8000"
    depends_on:
      - mysql

  frontend:
    build:
      context: ./frontend
    container_name: army_vehicle_frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mysql_data:
